name: Publish to PyPI

# Fires on git tag push matching v*.*.* — builds the wheel + sdist and
# publishes to PyPI via Trusted Publishing (no API tokens needed once
# the project is registered on PyPI with this repo as a trusted publisher).
#
# To enable:
#   1. Register the project name on https://pypi.org
#   2. Set up Trusted Publisher in PyPI settings pointing at this repo+workflow
#   3. Push a tag: `git tag v0.3.0 && git push origin v0.3.0`

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  id-token: write   # required for PyPI Trusted Publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build wheel + sdist
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
