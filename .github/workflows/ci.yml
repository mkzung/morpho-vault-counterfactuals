name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest + ruff (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Test (pytest)
        run: pytest tests/ -v

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Type-check (mypy)
        run: mypy src/mvcf

  cli-smoke:
    name: cli smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: CLI text format
        run: mvcf analyze --fixture steakhouse_usdc_snapshot_demo --format text
      - name: CLI json format
        run: mvcf analyze --fixture steakhouse_usdc_snapshot_demo --format json
      - name: CLI markdown format
        run: mvcf analyze --fixture steakhouse_usdc_snapshot_demo --format markdown
      - name: CLI sweep
        run: mvcf sweep collateral --fixture steakhouse_usdc_snapshot_demo --shocks=-0.05,-0.20,-0.50

  audit:
    # Audit runtime + dev deps for known CVEs. Non-blocking on transient
    # advisory-DB hiccups but visible in the run log; fail PR only on a real
    # vulnerability in something we depend on.
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit
      - name: Audit
        # --skip-editable: don't try to look up the current project (installed
        # via `pip install -e .`) on PyPI - it isn't published there. Only
        # audit the transitive dependency tree, which is what we actually care
        # about for CVE coverage. Note: --strict treats "skipped" entries as
        # errors and conflicts with --skip-editable, so the flag is dropped;
        # the audit still fails on any real CVE finding (default behavior).
        run: pip-audit --skip-editable --ignore-vuln PYSEC-0000-NONE
