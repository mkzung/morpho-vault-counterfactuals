name: Live snapshot (nightly)

# Pulls the current Steakhouse USDC vault state from the public Morpho Blue API
# and commits a fresh HTML + JSON report under `live-data/`. Produces a public
# time-series of curator metrics for one of the largest MetaMorpho vaults.

on:
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily, off-peak for the public API
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Fetch Steakhouse USDC + render reports
        env:
          MORPHO_API_KEY: ${{ secrets.MORPHO_API_KEY }}
        run: |
          mkdir -p live-data
          mvcf analyze \
            --vault 0xBEEF01735c132Ada46AA9aA4c54623cAA92A64CB \
            --format json --output live-data/steakhouse_usdc_latest.json
          mvcf analyze \
            --vault 0xBEEF01735c132Ada46AA9aA4c54623cAA92A64CB \
            --format html --output live-data/steakhouse_usdc_latest.html
          mvcf analyze \
            --vault 0xBEEF01735c132Ada46AA9aA4c54623cAA92A64CB \
            --format markdown --output live-data/steakhouse_usdc_latest.md

      - name: Archive timestamped copy
        run: |
          TS=$(date -u +"%Y-%m-%d")
          mkdir -p live-data/history
          cp live-data/steakhouse_usdc_latest.json "live-data/history/${TS}.json"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-data/
          if git diff --staged --quiet; then
            echo "  No change in live snapshot, skipping commit."
          else
            git commit -m "live-data: nightly Steakhouse USDC snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      # Surface broken runs as a GitHub issue, but reuse a single open tracking
      # issue instead of opening a new one on every failure (prevents stale-issue
      # pileup; the issue auto-closes on the next successful run, see below).
      - name: Report failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            const body = [
              `The nightly live-snapshot workflow failed on \`${context.sha}\` (${today}).`,
              ``,
              `Run: ${run_url}`,
              ``,
              `Common causes:`,
              `- Morpho Blue API schema change (check fetch.py GraphQL query).`,
              `- Upstream 429 / 5xx, retry loop in fetch.py exhausted.`,
              `- MORPHO_API_KEY secret rotated or removed.`,
              ``,
              `Live-data files in the repo are now stale until this is fixed.`,
            ].join('\n');
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'live-snapshot',
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Live snapshot failing`,
                body, labels: ['bug', 'live-snapshot'],
              });
            }

      # When a run succeeds again, resolve any open tracking issue so curators
      # are not left with a stale "failed" issue after a transient outage.
      - name: Resolve failure issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'live-snapshot',
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved: nightly snapshot succeeded on ${today}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: 'closed',
              });
            }
